# docker-compose.yml -- Postgres + FastAPI service composition
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose down            # stop services (data persists)
#   docker compose down -v         # stop and WIPE volume (needed to re-run init scripts after schema changes)
#   docker compose logs -f         # follow logs
#
# NOTE: Postgres Docker entrypoint only runs init scripts on first start (empty data dir).
# After schema changes, run `docker compose down -v` to wipe the volume and re-init.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic_workflows
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "agentic", "-d", "agentic_workflows"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agentic:agentic@postgres:5432/agentic_workflows
      P1_PROVIDER: ${P1_PROVIDER:-openai}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

volumes:
  pgdata:
