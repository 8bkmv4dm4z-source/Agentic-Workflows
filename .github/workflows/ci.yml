name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Typecheck (mypy)
        run: mypy src/

      - name: Test (pytest)
        run: pytest tests/ -q
        env:
          # ScriptedProvider is the test double for all LLM calls.
          # No live provider API keys are needed or used in the test suite.
          P1_PROVIDER: scripted
